<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>С Днём Рождения, Мама!</title>

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  text-align: center;
  background: radial-gradient(circle at center, #ff9a9e, #ff7eb3, #ff758c);
  overflow: hidden;
  color: white;
}

h1 {
  font-size: 80px;
  margin-top: 100px;
  animation: glow 2s infinite alternate;
  text-shadow: 0 0 20px #fff, 0 0 30px #ff9a9e, 0 0 40px #ff4b7d;
}

p {
  font-size: 30px;
  margin: 20px 20px;
  line-height: 1.5;
  text-shadow: 0 0 10px rgba(0,0,0,0.3);
}

button {
  padding: 20px 50px;
  font-size: 24px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(45deg, #ff7eb3, #ff758c);
  color: white;
  cursor: pointer;
  margin-top: 30px;
  transition: 0.3s;
  box-shadow: 0 0 20px rgba(255,75,125,0.7);
}

button:hover {
  transform: scale(1.2) rotate(-5deg);
  box-shadow: 0 0 40px rgba(255,75,125,1);
}

@keyframes glow {
  0% { text-shadow: 0 0 10px #fff, 0 0 20px #ff4b7d; }
  100% { text-shadow: 0 0 30px #fff, 0 0 60px #ff4b7d; }
}

.heart {
  position: absolute;
  font-size: 26px;
  animation: fall linear infinite;
  pointer-events: none;
}

@keyframes fall {
  0% { transform: translateY(-10vh) scale(0.5); opacity: 0.8; }
  50% { opacity: 1; }
  100% { transform: translateY(110vh) scale(1); opacity: 0; }
}

.message {
  display: none;
  font-size: 40px;
  margin-top: 40px;
  animation: pop 1s;
  text-shadow: 0 0 20px #fff;
}

@keyframes pop {
  0% { transform: scale(0); }
  100% { transform: scale(1); }
}

.fire {
  position: absolute;
  font-size: 28px;
  pointer-events: none;
  transition: 1.5s;
  user-select: none;
}
</style>
</head>

<body>

<h1>🎂 С Днём Рождения, Мама! 🎂</h1>

<p>
Ты самая лучшая мама на свете ❤️<br>
Спасибо за всё, что ты для меня делаешь!
</p>

<button onclick="startSurprise()">🎁 Нажми на подарок</button>

<div class="message" id="msg">💖 Я тебя очень люблю! 💖</div>

<script>
function startSurprise() {
  document.getElementById('msg').style.display = 'block';
  fireworks();
  sparkleHearts();
}

function fireworks() {
  for (let i = 0; i < 150; i++) {
    let f = document.createElement('div');
    f.className = 'fire';
    f.innerHTML = '✨';

    f.style.left = '50%';
    f.style.top = '50%';

    let angle = Math.random() * 2 * Math.PI;
    let distance = Math.random() * 500;

    document.body.appendChild(f);

    setTimeout(() => {
      f.style.transform = `translate(${Math.cos(angle)*distance}px, ${Math.sin(angle)*distance}px)`;
      f.style.opacity = 0;
    }, 10);

    setTimeout(() => { f.remove(); }, 1800);
  }
}

function createHeart() {
  let heart = document.createElement('div');
  heart.className = 'heart';
  heart.innerHTML = '💖';
  heart.style.left = Math.random() * 100 + 'vw';
  heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}

function sparkleHearts() {
  let interval = setInterval(createHeart, 200);
  setTimeout(() => clearInterval(interval), 7000);
}

</script>

</body>
</html>
